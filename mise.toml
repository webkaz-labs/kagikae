[tools]
go = "1.26.4"

[tasks.test]
description = "Run Go tests with cache and wall time"
run = "/usr/bin/time -p go test ./..."

[tasks.test-fresh]
description = "Run Go tests without cache and show wall time"
run = "/usr/bin/time -p go test -count=1 ./..."

[tasks.vet]
description = "Run Go vet"
run = "go vet ./..."

[tasks.mod-verify]
description = "Verify downloaded Go modules"
run = "go mod verify"

[tasks.fmt-check]
description = "Fail when any Go file is not gofmt-formatted"
run = '''
unformatted=$(gofmt -l .)
if [ -n "$unformatted" ]; then
  echo "gofmt needed for:"
  echo "$unformatted"
  exit 1
fi
'''

[tasks.check]
description = "Run the standard local validation suite"
depends = ["test", "vet", "mod-verify", "fmt-check"]

[tasks.install]
description = "Build and install kae into ~/.local/bin for real-machine use"
run = "go build -o ${HOME}/.local/bin/kae ."

[tasks.build]
description = "Build the kae binary into ./dist"
run = "mkdir -p dist && go build -o dist/kae ."
